description "VoidCoin Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env VOIDCOIND_BIN="/usr/bin/voidcoind"
env VOIDCOIND_USER="voidcoin"
env VOIDCOIND_GROUP="voidcoin"
env VOIDCOIND_PIDDIR="/var/run/voidcoind"
# upstart can't handle variables constructed with other variables
env VOIDCOIND_PIDFILE="/var/run/voidcoind/voidcoind.pid"
env VOIDCOIND_CONFIGFILE="/etc/voidcoin/voidcoin.conf"
env VOIDCOIND_DATADIR="/var/lib/voidcoind"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # voidcoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$VOIDCOIND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run voidcoind."
        echo "The setting must appear in $VOIDCOIND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"VoidCoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$VOIDCOIND_PIDDIR"
    chmod 0755 "$VOIDCOIND_PIDDIR"
    chown $VOIDCOIND_USER:$VOIDCOIND_GROUP "$VOIDCOIND_PIDDIR"
    chown $VOIDCOIND_USER:$VOIDCOIND_GROUP "$VOIDCOIND_CONFIGFILE"
    chmod 0660 "$VOIDCOIND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$VOIDCOIND_PIDFILE" \
    --chuid $VOIDCOIND_USER:$VOIDCOIND_GROUP \
    --exec "$VOIDCOIND_BIN" \
    -- \
    -pid="$VOIDCOIND_PIDFILE" \
    -conf="$VOIDCOIND_CONFIGFILE" \
    -datadir="$VOIDCOIND_DATADIR" \
    -disablewallet \
    -daemon

